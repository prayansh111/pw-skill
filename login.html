<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PW Skills Clone</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f3f7ff; }
        .box { max-width: 400px; width: 90%; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .maintenance-msg { display: none; color: #1b4697; }
        .error { color: red; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div id="login-section" class="box">
        <h2 style="color: #1b4697; margin-bottom: 20px;">Course Login</h2>
        <p id="error-msg" class="error">Invalid Number or Password!</p>
        <input type="text" id="phone" placeholder="Enter Phone Number">
        <input type="password" id="pass" placeholder="Enter Password">
        <button class="login-btn" style="width: 100%; margin-top: 10px;" onclick="handleLogin()">Login to View Course</button>
    </div>

    <div id="maintenance-section" class="box maintenance-msg">
        <h1 style="font-size: 50px;">🛠️</h1>
        <h2>Under Maintenance</h2>
        <p style="font-size: 18px; margin-top: 15px; color: #555;">Please view the C++ Course after <b>12:00 AM</b>.</p>
        <button class="login-btn" style="margin-top: 20px; background: #666;" onclick="window.location.href='index.html'">Go Back</button>
    </div>

    <script>
        function handleLogin() {
            const phone = document.getElementById('phone').value;
            const pass = document.getElementById('pass').value;
            const error = document.getElementById('error-msg');
            const loginBox = document.getElementById('login-section');
            const maintenanceBox = document.getElementById('maintenance-section');

            // Your Credentials
            if (phone === "9835871031" && pass === "896972") {
                loginBox.style.display = "none";
                maintenanceBox.style.display = "block";
            } else {
                error.style.display = "block";
            }
        }
    </script>
</body>
</html>
